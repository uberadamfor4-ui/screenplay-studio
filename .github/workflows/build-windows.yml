name: Build Windows

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/build-windows.yml"
      - "assets/**"
      - "electron/**"
      - "src/**"
      - "tests/**"
      - "index.html"
      - "package.json"
      - "package-lock.json"
      - "tsconfig*.json"
      - "vite.config.ts"

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run dist:win
      - uses: actions/upload-artifact@v4
        with:
          name: screenplay-studio-windows-x64
          path: release/Screenplay-Studio-*-Setup.exe
          if-no-files-found: error
          retention-days: 14
