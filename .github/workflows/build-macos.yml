name: Build macOS

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/build-macos.yml"
      - "assets/**"
      - "electron/**"
      - "src/**"
      - "index.html"
      - "package.json"
      - "package-lock.json"
      - "tsconfig*.json"
      - "vite.config.ts"

permissions:
  contents: read

jobs:
  build:
    name: macOS ${{ matrix.arch }}
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        arch:
          - x64
          - arm64
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build renderer
        run: npm run build

      - name: Build macOS ${{ matrix.arch }} package
        run: npx electron-builder --mac dmg zip --${{ matrix.arch }} --publish never

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: screenplay-studio-macos-${{ matrix.arch }}
          path: |
            release/Screenplay-Studio-*.dmg
            release/Screenplay-Studio-*.zip
          if-no-files-found: error
          retention-days: 14
