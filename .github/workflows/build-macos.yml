name: Build macOS

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/build-macos.yml"
      - "assets/**"
      - "electron/**"
      - "src/**"
      - "tests/**"
      - "index.html"
      - "package.json"
      - "package-lock.json"
      - "tsconfig*.json"
      - "vite.config.ts"

permissions:
  contents: read

jobs:
  build:
    name: macOS ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: macos-15-intel
          - arch: arm64
            runner: macos-15
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify native PDF support
        run: node -e "const canvas = require('@napi-rs/canvas'); if (typeof canvas.DOMMatrix !== 'function') process.exit(1); console.log(process.platform, process.arch, 'DOMMatrix ready')"

      - name: Lint
        run: npm run lint

      - name: Layout regression tests
        run: npm test

      - name: Build renderer
        run: npm run build

      - name: Build macOS ${{ matrix.arch }} package
        run: npx electron-builder --mac dmg zip --${{ matrix.arch }} --publish never

      - name: Verify packaged native architecture
        run: |
          archive=$(find release -maxdepth 1 -name "Screenplay-Studio-*-${{ matrix.arch }}.zip" -print -quit)
          test -n "$archive"
          unzip -l "$archive" | grep "canvas-darwin-${{ matrix.arch }}/skia.darwin-${{ matrix.arch }}.node"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: screenplay-studio-macos-${{ matrix.arch }}
          path: |
            release/Screenplay-Studio-*.dmg
            release/Screenplay-Studio-*.zip
          if-no-files-found: error
          retention-days: 14
